#specifies the Docker Compose file format version
version: '3.8'

services:
  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
    env_file: .env
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html/wordpress
    restart: always
    networks:
      inception:

  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
    restart: unless-stopped
    env_file: .env
#    environment:
#      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
#      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      inception:
#    ports:
#     - 3306:3306

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
    depends_on:
      - mariadb
    restart: always
#    ports:
#      - 9000:9000
    env_file: .env
#    environment:
#      DB_PASSWORD: ${DB_PASSWORD}
#      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
#      WP_USER_PASSWORD: ${WP_USER_PASSWORD}
    volumes:
      - wordpress:/var/www/html/wordpress
    networks:
      inception:

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/kbolon/data/wordpress
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/kbolon/data/mariadb

networks:
  inception:
    name: inception

