#specifies the Docker Compose file format version
version: '3.8'

services:
  nginx:
    build:
      context: /home/kbolon/Documents/Inception_working
      dockerfile: srcs/requirements/nginx/Dockerfile
    env_file: .env
    depends_on:
      - wordpress
      - mariadb
    ports:
      - 443:443
    volumes:
      - ./web:/var/www/html
    restart: unless-stopped
    networks:
      inception:
    extra_hosts:
      - "kbolon.42.fr:127.0.0.1"

  mariadb:
    build:
      context: ./requirements/mariadb
    secrets:
      - db_password
      - db_root_password
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - ./database:/var/lib/mysql
    networks:
      inception:
    ports:
     - 3306:3306

  wordpress:
    build:
      context: ./requirements/wordpress
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    restart: unless-stopped
    ports:
      - 9000:9000
    env_file: .env
    environment:
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_ADMIN_PASSWORD: /run/secrets/wp_admin_password
      WORDPRESS_USER_PASSWORD: /run/secrets/wp_user_password
    volumes:
      - ./web:/var/www/html
    networks:
      inception:

#secrets are already loaded in docker swarm
secrets:
  db_root_password:
    external: true
  db_password:
    external: true
  wp_admin_password:
    external: true
  wp_user_password:
    external: true

networks:
  inception:
    driver: bridge



